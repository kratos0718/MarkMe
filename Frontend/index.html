<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkMe | Smart Attendance</title>
    <meta name="description" content="MarkMe — Smart Attendance with Face Recognition, GPS Geo-fencing & Session Keys. Built by Abhinav Tarigoopula." />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Initial loading screen */
      #splash {
        position: fixed;
        inset: 0;
        background: #050505;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
        gap: 1.5rem;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }

      .splash-logo {
        font-family: 'Courier New', monospace;
        font-size: 2.2rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        background: linear-gradient(135deg, #fbbf24, #f59e0b, #fbbf24);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmerSplash 1.5s linear infinite;
      }
      .splash-sub {
        font-family: 'Courier New', monospace;
        font-size: 0.72rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #7a6a4f;
      }
      .splash-bar-wrap {
        width: 200px;
        height: 2px;
        background: rgba(251,191,36,0.1);
        border-radius: 1px;
        overflow: hidden;
      }
      .splash-bar {
        height: 100%;
        background: linear-gradient(90deg, #d97706, #fbbf24);
        animation: loadBar 1.8s ease forwards;
        box-shadow: 0 0 8px rgba(251,191,36,0.5);
      }
      @keyframes shimmerSplash {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes loadBar {
        0%   { width: 0%; }
        60%  { width: 80%; }
        100% { width: 100%; }
      }

      /* Grid overlay on splash */
      #splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(251,191,36,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(251,191,36,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
      }
    </style>
  </head>
  <body>
    <!-- Splash / Boot screen -->
    <div id="splash">
      <div class="splash-logo">MARKME</div>
      <div class="splash-sub">Smart Attendance · Initializing</div>
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Remove splash after app mounts
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) splash.classList.add('hidden');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 700);
        }, 1800);
      });
    </script>
  </body>
</html>
