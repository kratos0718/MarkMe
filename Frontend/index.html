<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkMe | Smart Attendance</title>
    <meta name="description" content="MarkMe — Smart Attendance with Face Recognition, GPS Geo-fencing & Session Keys. Built by Abhinav Tarigoopula." />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Initial loading screen */
      #splash {
        position: fixed;
        inset: 0;
        background: #f6f7f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        gap: 1.25rem;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }

      .splash-logo {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #0f172a;
      }
      .splash-sub {
        font-size: 0.85rem;
        color: #64748b;
      }
      .splash-bar-wrap {
        width: 180px;
        height: 4px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }
      .splash-bar {
        height: 100%;
        background: #4f46e5;
        border-radius: 999px;
        animation: loadBar 1.6s ease forwards;
      }
      @keyframes loadBar {
        0%   { width: 0%; }
        60%  { width: 80%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Splash / Boot screen -->
    <div id="splash">
      <svg width="56" height="56" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="44" height="44" rx="12" fill="#4f46e5"/>
        <path d="M13 24.5 L20.5 32 L35 16" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="splash-logo">MarkMe</div>
      <div class="splash-sub">Smart Attendance</div>
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Remove splash after app mounts
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) splash.classList.add('hidden');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 700);
        }, 1800);
      });
    </script>
  </body>
</html>
